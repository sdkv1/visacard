<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Standard v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 selection:bg-indigo-100 selection:text-indigo-700">

    <nav x-data="{ mobileMenu: false, scrolled: false }" 
         @scroll.window="scrolled = (window.pageYOffset > 20)"
         :class="scrolled ? 'bg-white/80 backdrop-blur-md border-b border-slate-200/50 py-3' : 'bg-transparent py-5'"
         class="fixed w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl shadow-lg shadow-indigo-200 flex items-center justify-center text-white font-bold">V2</div>
                <span class="text-xl font-extrabold tracking-tight">Nexus<span class="text-indigo-600">UI</span></span>
            </div>

            <div class="hidden md:flex items-center space-x-10 font-medium text-slate-600">
                <a href="#" class="hover:text-indigo-600 transition">Produk</a>
                <a href="#" class="hover:text-indigo-600 transition">Fitur</a>
                <a href="#" class="hover:text-indigo-600 transition">Harga</a>
                <a href="#" class="bg-slate-900 text-white px-6 py-2.5 rounded-full hover:shadow-xl hover:shadow-slate-200 transition-all active:scale-95 text-sm">Mulai Sekarang</a>
            </div>

            <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 text-slate-600">
                <svg x-show="!mobileMenu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
                <svg x-show="mobileMenu" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div x-show="mobileMenu" x-cloak x-transition.opacity class="fixed inset-0 bg-white z-40 md:hidden flex flex-col items-center justify-center space-y-8 text-2xl font-bold">
            <a @click="mobileMenu = false" href="#">Produk</a>
            <a @click="mobileMenu = false" href="#">Fitur</a>
            <a @click="mobileMenu = false" href="#">Harga</a>
            <button class="bg-indigo-600 text-white px-10 py-4 rounded-2xl">Mulai Sekarang</button>
        </div>
    </nav>

    <main class="relative pt-20 overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[600px] bg-gradient-to-b from-indigo-50/50 to-transparent -z-10"></div>
        <div class="absolute top-20 left-10 w-72 h-72 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-20 right-10 w-72 h-72 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

        <div class="max-w-7xl mx-auto px-6 pt-24 pb-32 text-center md:text-left flex flex-col md:flex-row items-center">
            <div class="md:w-1/2">
                <span class="inline-block px-4 py-1.5 mb-6 text-sm font-semibold tracking-wide text-indigo-600 uppercase bg-indigo-50 rounded-full">
                    Update Terbaru v2.0
                </span>
                <h1 class="text-5xl md:text-7xl font-extrabold leading-[1.1] mb-8 italic">
                    Desain Lebih <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-500">Hidup.</span>
                </h1>
                <p class="text-lg text-slate-500 mb-10 max-w-lg leading-relaxed">
                    Tingkatkan pengalaman pengguna dengan interface yang lebih responsif, elegan, dan berfokus pada detail minimalis.
                </p>
                <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4 justify-center md:justify-start">
                    <button class="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 transition-all active:scale-95">
                        Dapatkan Akses
                    </button>
                    <button class="px-8 py-4 bg-white border border-slate-200 text-slate-700 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Lihat Demo
                    </button>
                </div>
            </div>

            <div class="md:w-1/2 mt-16 md:mt-0 relative">
                <div class="bg-white p-4 rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 transform md:rotate-3 hover:rotate-0 transition-transform duration-500">
                    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=2426&auto=format&fit=crop" class="rounded-[2rem]" alt="Dashboard Preview">
                </div>
            </div>
        </div>
    </main>

</body>
</html>
