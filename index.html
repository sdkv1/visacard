<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE CHAIN - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-2 md:p-6 min-h-screen bg-grid" x-data="nodeChain()" x-init="init()">

<div class="max-w-[1100px] mx-auto w-full">
    
    <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 p-6 rounded-[2.5rem] shadow-xl glass border border-orange-100">
        <div class="text-center lg:text-left">
            <h1 class="text-2xl font-black tracking-[0.2em] uppercase italic neon-orange">NODE <span class="text-slate-800">CHAIN</span></h1>
            <p class="text-[9px] text-orange-600 font-mono uppercase tracking-[0.2em]">Operational_Live_Node // v1.2.5</p>
        </div>

        <div class="flex items-center gap-5 bg-white px-5 py-3 rounded-[2.5rem] border border-orange-100 shadow-sm">
            <div class="relative w-20 h-20 flex items-center justify-center bg-slate-50 rounded-full border-2 border-orange-200">
                <span class="absolute top-1 text-[10px] font-black text-slate-400">12</span>
                <span class="absolute right-1.5 text-[10px] font-black text-slate-400">3</span>
                <span class="absolute bottom-1 text-[10px] font-black text-slate-400">6</span>
                <span class="absolute left-1.5 text-[10px] font-black text-slate-400">9</span>
                <svg viewBox="0 0 100 100" class="w-full h-full -rotate-90">
                    <line x1="50" y1="50" x2="72" y2="50" class="hand-hour" :style="`transform: rotate(${hourRotation}deg)`" />
                    <line x1="50" y1="50" x2="88" y2="50" class="hand-min" :style="`transform: rotate(${minuteRotation}deg)`" />
                    <line x1="50" y1="50" x2="92" y2="50" class="hand-sec" :style="`transform: rotate(${secondRotation}deg)`" />
                    <circle cx="50" cy="50" r="3" fill="#f97316" stroke="white" stroke-width="1" />
                </svg>
            </div>
            <div class="flex flex-col border-l-2 border-orange-50 pl-4">
                <div class="flex items-baseline leading-none">
                    <span class="text-2xl font-mono font-black text-slate-800" x-text="liveTime"></span>
                    <span class="text-xs font-mono font-bold text-orange-500 ml-1 w-6" x-text="liveSeconds"></span>
                </div>
                <span class="text-[11px] font-mono font-black text-slate-400 mt-2 uppercase" x-text="liveDate"></span>
            </div>
        </div>
    </div>

    <div class="mb-10">
        <div class="flex items-center justify-between mb-6 px-4">
            <h3 class="text-md font-black text-slate-800 uppercase tracking-widest">Admin Control</h3>
            <button class="btn-primary">+ Register Admin</button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl border border-orange-50 overflow-hidden glass">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="table-head">
                        <th class="px-8 py-5">Administrator</th>
                        <th class="px-8 py-5">Auth</th>
                        <th class="px-8 py-5">Outlet</th>
                        <th class="px-8 py-5 text-center">Role & Status</th>
                        <th class="px-8 py-5 text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-orange-50">
                    <tr class="hover:bg-orange-50/20 transition-all">
                        <td class="px-8 py-5">
                            <div class="flex items-center gap-4">
                                <div class="avatar">JD</div>
                                <span class="text-sm font-black text-slate-800">John Doe</span>
                            </div>
                        </td>
                        <td class="px-8 py-5 font-mono text-xs text-slate-400">••••••••</td>
                        <td class="px-8 py-5 text-[11px] font-bold text-slate-700">Pusat Sudirman</td>
                        <td class="px-8 py-5">
                            <div class="flex flex-col items-center gap-1">
                                <span class="badge-role">Super_Admin</span>
                                <span class="text-[9px] font-black text-emerald-500 uppercase">● Active</span>
                            </div>
                        </td>
                        <td class="px-8 py-5 text-right">
                            <button class="text-orange-500 font-bold text-[10px] uppercase">Edit</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
